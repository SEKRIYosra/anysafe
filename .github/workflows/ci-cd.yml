name: ANYSafe – CI/CD Security Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1 – Unit Tests
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Pytest suite
        env:
          GEMINI_API_KEY: mock_key
        run: |
          PYTHONPATH=. pytest backend/test_main.py -v --tb=short

  # ---------------------------------------------------------------------------
  # JOB 2 – DevSecOps Scans
  # ---------------------------------------------------------------------------
  security-scans:
    name: DevSecOps Scans
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. SAST – Python source code and dependency scan
      - name: Trivy – SAST / Dependency Scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./backend"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      # 2. IaC – Terraform configuration scan
      - name: Trivy – Terraform IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "./terraform"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      # 3. Container – Build image then scan it
      - name: Build Docker image (backend)
        run: |
          docker build -t anysafe-api:${{ github.sha }} -f backend/Dockerfile ./backend

      - name: Trivy – Container Image Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: "anysafe-api:${{ github.sha }}"
          format: "table"
          severity: "CRITICAL,HIGH"

  # ---------------------------------------------------------------------------
  # JOB 3 – Frontend Build Check
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
